<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta name="referrer" content="no-referrer-when-downgrade"/>
  <meta name="robots" content="noindex, follow"/>
  <title>Connexion — KALEO GROUPE</title>
  <link rel="icon" type="image/png" href="/LOGO KALEO.png"/>
  <link rel="stylesheet" href="/css/style.css?v=4"/>
  <link rel="stylesheet" href="/css/animations.css?v=2"/>
  <link rel="stylesheet" href="/css/devis.css?v=2"/>
  <link rel="stylesheet" href="/css/boutique.css?v=3"/>
  <link rel="stylesheet" href="/css/chatbot.css?v=3"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <img src="/LOGO KALEO.png" alt="KALEO GROUPE Logo" class="logo-img-nav"/>
        <span class="logo-text">KALEO<span class="accent"> GROUPE</span></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Accueil</a></li>
        <li><a href="/boutique">Boutique</a></li>
        <li id="navAccount"></li>
        <li><a href="/panier" class="cart-icon-link" aria-label="Panier"><i class="fas fa-cart-shopping"></i><span class="cart-badge" id="cartBadge">0</span></a></li>
      </ul>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <span class="section-eyebrow">Compte client</span>
      <h1>Se <span class="accent">connecter</span></h1>
      <p>Retrouvez votre historique de commandes.</p>
    </div>
  </div>

  <section class="devis-section">
    <div class="container">
      <div class="checkout-layout" style="max-width: 480px; margin: 0 auto; grid-template-columns: 1fr;">
        <div class="devis-form-wrap reveal">
          <div class="form-card">
            <h2 class="form-title">Connexion</h2>
            <p class="form-subtitle">Pas encore de compte ? <a href="/compte/inscription" class="accent" style="text-decoration:underline;">Inscrivez-vous</a>.</p>

            <div class="checkout-error" id="loginError"></div>

            <form id="loginForm" novalidate>
              <div class="form-group">
                <label for="loginEmail">Email *</label>
                <input type="email" id="loginEmail" required/>
              </div>
              <div class="form-group">
                <label for="loginPassword">Mot de passe *</label>
                <input type="password" id="loginPassword" required/>
              </div>
              <div class="form-nav">
                <button type="submit" class="btn-primary btn-large" id="loginBtn" style="width:100%; justify-content:center;">
                  Se connecter
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: 1px solid var(--border); padding-top: 24px;">
        <p>© 2023 KALEO GROUPE. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

  <script src="/js/config.js?v=2"></script>
  <script src="/js/cart.js?v=1"></script>
  <script src="/js/customer-auth.js?v=1"></script>
  <script src="/js/main.js?v=2"></script>
  <script src="/js/chatbot.js?v=3"></script>
  <script>
    if (getCustomerToken()) window.location.href = '/compte/commandes';

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';

      fetch(window.API_BASE_URL + '/customers/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value.trim(),
          password: document.getElementById('loginPassword').value
        })
      })
        .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
        .then(function (result) {
          if (!result.ok) throw new Error(result.data.error || 'Identifiants invalides');
          setCustomerSession(result.data.token, result.data.customer);
          var params = new URLSearchParams(window.location.search);
          window.location.href = params.get('next') || '/compte/commandes';
        })
        .catch(function (err) {
          btn.disabled = false;
          btn.innerHTML = 'Se connecter';
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
        });
    });
  </script>
</body>
</html>
